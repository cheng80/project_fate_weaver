events:
  - id: forest_injured_traveler_hint
    name: 숲길의 부상자
    description: 오래된 숲길 옆에서 다친 여행자가 약초 냄새에 눈을 뜬다.
    region_tags: [forest]
    event_tags: [exploration]
    danger_tags: [hunger]
    storylet_tags: [forest, npc, aid_opportunity, injured_traveler, optional_objective, reputation, quest_related]
    card_candidate_hints: [help_injured_traveler]
    cooldown_tags: [npc_aid, injured_traveler]
    repeat_group: forest_npc_aid
    base_weight: 12
    cooldown_turns: 2
    choices:
      - id: pass
        text: 길을 살피며 지나간다
        type: safe
        risk_level: low
        result:
          message: 부상자를 지나치며 길의 흔적만 확인했다.

  - id: forest_trail_marker_hint
    name: 숲길의 낡은 표식
    description: 마을 어귀에서 숲으로 이어지는 오래된 표식이 희미하게 남아 있다.
    region_tags: [village, forest]
    event_tags: [exploration]
    danger_tags: [lost]
    storylet_tags: [forest, trail, forest_trail, trail_marker, clue, scouting_opportunity, quest_related]
    card_candidate_hints: [inspect_forest_marker, follow_beast_tracks, conserve_food_on_trail]
    cooldown_tags: [forest_trail, scouting_clue]
    repeat_group: forest_trail_scouting
    base_weight: 14
    cooldown_turns: 2
    choices:
      - id: pass
        text: 표식을 확인한다
        type: safe
        risk_level: low
        result:
          message: 낡은 표식을 따라 숲길의 방향을 가늠했다.

  - id: forest_beast_tracks_hint
    name: 숲길의 짐승 발자국
    description: 안전해 보이는 길 옆 진흙에 큰 발자국이 찍혀 있다.
    region_tags: [forest]
    event_tags: [exploration]
    danger_tags: [beast]
    storylet_tags: [forest, trail, beast_tracks, marking_opportunity, scouting_opportunity, quest_related]
    card_candidate_hints: [follow_beast_tracks, mark_beast_tracks, conserve_food_on_trail]
    cooldown_tags: [forest_trail, beast_tracks]
    repeat_group: forest_trail_scouting
    base_weight: 12
    cooldown_turns: 2
    choices:
      - id: pass
        text: 흔적을 살핀다
        type: risky
        risk_level: medium
        result:
          message: 발자국은 최근의 것이지만 아직 길을 막지는 않았다.

  - id: forest_return_report_hint
    name: 마을로 돌아가는 갈림길
    description: 표식을 확인한 길이 다시 마을 쪽 능선으로 이어진다.
    region_tags: [forest]
    event_tags: [exploration]
    danger_tags: [lost]
    storylet_tags: [forest, trail, return_report, scouting_opportunity, quest_related]
    card_candidate_hints: [return_to_village_report, conserve_food_on_trail]
    cooldown_tags: [forest_trail, return_report]
    repeat_group: forest_return_report
    base_weight: 10
    cooldown_turns: 2
    choices:
      - id: pass
        text: 귀환로를 확인한다
        type: safe
        risk_level: low
        result:
          message: 마을로 돌아갈 길이 충분히 분명해졌다.

  - id: old_road_footprints_hint
    name: 오래된 짐수레 길의 발자국
    description: 마을 밖 오래된 짐수레 길에 낯선 발자국과 끌린 자국이 남아 있다.
    region_tags: [village, forest]
    event_tags: [exploration]
    danger_tags: [lost]
    storylet_tags: [old_road, porter, tracks, rescue, time_pressure, tracking_opportunity, quest_related]
    card_candidate_hints: [track_porter_footprints, inspect_broken_cart, buy_hunter_information]
    cooldown_tags: [porter_tracks, old_road_clue]
    repeat_group: porter_search_tracking
    base_weight: 15
    cooldown_turns: 2
    choices:
      - id: pass
        text: 흔적을 확인한다
        type: safe
        risk_level: low
        result:
          message: 흔적은 숲 가장자리의 낡은 길로 이어진다.

  - id: broken_cart_near_forest_hint
    name: 숲가의 부서진 수레
    description: 숲길 초입에 부서진 수레와 찢긴 상단 표식이 흩어져 있다.
    region_tags: [forest]
    event_tags: [exploration]
    danger_tags: [trap]
    storylet_tags: [broken_cart, porter, recovery, rescue, tracking_opportunity, quest_related]
    card_candidate_hints: [inspect_broken_cart, recover_lost_pack, rescue_injured_porter]
    cooldown_tags: [broken_cart, porter_search_clue]
    repeat_group: porter_search_tracking
    base_weight: 13
    cooldown_turns: 2
    choices:
      - id: pass
        text: 수레 주변을 살핀다
        type: risky
        risk_level: medium
        result:
          message: 수레 아래의 피 묻은 천 조각이 더 깊은 숲길을 가리킨다.

  - id: injured_porter_call_hint
    name: 다친 짐꾼의 작은 외침
    description: 숲길 아래쪽에서 거의 들리지 않는 구조 요청이 반복된다.
    region_tags: [forest]
    event_tags: [survival]
    danger_tags: [physical]
    storylet_tags: [injured_porter, rescue_opportunity, time_pressure, porter, quest_related]
    card_candidate_hints: [rescue_injured_porter, recover_lost_pack]
    cooldown_tags: [injured_porter, rescue_call]
    repeat_group: porter_search_rescue
    base_weight: 14
    cooldown_turns: 2
    choices:
      - id: pass
        text: 외침의 방향을 잡는다
        type: risky
        risk_level: medium
        result:
          message: 구조 요청은 아직 가까이 있지만 오래 버티기는 어려워 보인다.

  - id: lost_pack_under_roots_hint
    name: 나무뿌리 아래의 잃어버린 짐
    description: 비탈진 나무뿌리 아래에 상단 표식이 찍힌 짐 꾸러미가 걸려 있다.
    region_tags: [forest]
    event_tags: [exploration]
    danger_tags: [trap]
    storylet_tags: [lost_pack, recovery, roots, porter, quest_related]
    card_candidate_hints: [recover_lost_pack, return_with_porter_report]
    cooldown_tags: [lost_pack, porter_recovery]
    repeat_group: porter_search_recovery
    base_weight: 10
    cooldown_turns: 2
    choices:
      - id: pass
        text: 짐의 위치를 기억한다
        type: safe
        risk_level: low
        result:
          message: 짐은 회수할 수 있지만 시간을 더 써야 한다.

  - id: merchant_missing_pack_hint
    name: 초조한 상인의 증언
    description: 마을 광장의 상인이 잃어버린 짐 꾸러미와 보상 조건을 빠르게 설명한다.
    region_tags: [village]
    event_tags: [trade]
    danger_tags: [lost]
    storylet_tags: [merchant, lost_pack, negotiation, money, recovery_opportunity, quest_related]
    card_candidate_hints: [question_merchant_about_pack, inspect_lost_pack_tracks, negotiate_bonus_payment]
    cooldown_tags: [merchant_negotiation, pack_recovery]
    repeat_group: merchant_pack_negotiation
    base_weight: 15
    cooldown_turns: 2
    choices:
      - id: pass
        text: 상인의 설명을 듣는다
        type: safe
        risk_level: low
        result:
          message: 상인은 짐 표식과 보상 약속을 분명히 했다.

  - id: road_scuff_marks_hint
    name: 길가의 끌린 자국
    description: 숲길 입구의 흙바닥에 무거운 짐을 끌고 간 자국이 남아 있다.
    region_tags: [forest]
    event_tags: [exploration]
    danger_tags: [lost]
    storylet_tags: [tracks, lost_pack, scuff_marks, recovery_opportunity, quest_related]
    card_candidate_hints: [inspect_lost_pack_tracks, follow_bandit_scuff_marks]
    cooldown_tags: [road_tracks, pack_recovery]
    repeat_group: merchant_pack_tracking
    base_weight: 14
    cooldown_turns: 2
    choices:
      - id: pass
        text: 끌린 자국을 따라간다
        type: safe
        risk_level: low
        result:
          message: 흔적은 숲가 은닉처 쪽으로 이어진다.

  - id: bandit_cache_near_roots_hint
    name: 나무뿌리 옆 도적 은닉처
    description: 굵은 나무뿌리 아래에 급히 숨긴 상단 짐과 도적의 흔적이 보인다.
    region_tags: [forest]
    event_tags: [exploration]
    danger_tags: [bandit]
    storylet_tags: [bandit_cache, lost_pack, recovery_opportunity, moral_choice, quest_related]
    card_candidate_hints: [follow_bandit_scuff_marks, recover_lost_merchant_pack, hide_valuable_trinket]
    cooldown_tags: [bandit_cache, pack_recovery]
    repeat_group: merchant_pack_recovery
    base_weight: 13
    cooldown_turns: 2
    choices:
      - id: pass
        text: 은닉처를 확인한다
        type: risky
        risk_level: medium
        result:
          message: 짐은 회수할 수 있지만 일부는 쉽게 숨길 수도 있어 보인다.

  - id: merchant_reward_dispute_hint
    name: 보상 문제로 불안한 귀환길
    description: 상인이 약속한 보상을 제대로 줄지 확신이 없어 협상할 말을 고른다.
    region_tags: [forest]
    event_tags: [trade]
    danger_tags: [lost]
    storylet_tags: [merchant, honest_return, negotiation, reward_dispute, moral_choice, quest_related]
    card_candidate_hints: [return_pack_honestly, negotiate_bonus_payment, hide_valuable_trinket]
    cooldown_tags: [merchant_negotiation, reward_dispute]
    repeat_group: merchant_pack_negotiation
    base_weight: 12
    cooldown_turns: 2
    choices:
      - id: pass
        text: 보상 조건을 정리한다
        type: safe
        risk_level: low
        result:
          message: 정직하게 돌려주면 신뢰를 얻고, 몰래 챙기면 돈만 남을 것이다.

  - id: village_sick_well_hint
    name: 병든 우물의 웅성거림
    description: 마을 사람들이 검게 흐려진 우물 주변에서 서로 다른 증언을 내놓는다.
    region_tags: [village]
    event_tags: [exploration]
    danger_tags: [hunger]
    storylet_tags: [village, sick_well, well_contamination, repair_opportunity, local_problem, quest_related]
    card_candidate_hints: [inspect_sick_well, purify_well_with_herbs, report_well_restored]
    cooldown_tags: [village_well, local_problem]
    repeat_group: village_well_probe
    base_weight: 16
    cooldown_turns: 2
    choices:
      - id: pass
        text: 우물 주변 증언을 듣는다
        type: safe
        risk_level: low
        result:
          message: 주민들은 우물 안쪽 검은 침전물을 두려워하고 있다.

  - id: ruin_mark_probe_hint
    name: 폐허 표식의 이상한 반복
    description: 폐허 입구 돌문에 같은 표식이 세 번 반복되어 있다.
    region_tags: [village, ruin]
    event_tags: [exploration]
    danger_tags: [ancient]
    storylet_tags: [ruin_mark, ruin_omen, ancient_symbol, investigation, quest_related]
    card_candidate_hints: [copy_ruin_mark, interpret_omen_pattern, report_ruin_mark]
    cooldown_tags: [ruin_mark, investigation]
    repeat_group: ruin_mark_probe
    base_weight: 16
    cooldown_turns: 2
    choices:
      - id: pass
        text: 표식의 방향을 살핀다
        type: safe
        risk_level: low
        result:
          message: 표식은 폐허 안쪽의 봉인 방향을 가리킨다.

  - id: village_night_defense_hint
    name: 밤 방어를 준비하는 마을
    description: 외곽 울타리 너머로 같은 발자국이 반복해서 찍혀 있다.
    region_tags: [village]
    event_tags: [survival]
    danger_tags: [beast]
    storylet_tags: [night_threat, barricade, night_watch, civilian, evacuation, defense, quest_related]
    card_candidate_hints: [raise_village_barricade, evacuate_border_homes, hold_night_watch]
    cooldown_tags: [night_defense, village_threat]
    repeat_group: village_defense_probe
    base_weight: 16
    cooldown_turns: 2
    choices:
      - id: pass
        text: 울타리 주변을 살핀다
        type: risky
        risk_level: medium
        result:
          message: 위협은 밤이 깊으면 마을 외곽으로 다시 올 것이다.

  - id: ghost_town_medicine_hint
    name: 유령 마을로 가는 약 꾸러미
    description: 약사가 닫힌 마을까지 약을 옮길 길과 복용법을 알려준다.
    region_tags: [village, forest]
    event_tags: [trade]
    danger_tags: [lost]
    storylet_tags: [medicine_bundle, silent_road, ghost_town_route, ghost_town, medicine_delivery, delivery, travel, quest_related]
    card_candidate_hints: [take_medicine_bundle, cross_silent_road, deliver_ghost_town_medicine]
    cooldown_tags: [medicine_delivery, ghost_town]
    repeat_group: medicine_run_probe
    base_weight: 16
    cooldown_turns: 2
    choices:
      - id: pass
        text: 약 꾸러미의 봉인을 확인한다
        type: safe
        risk_level: low
        result:
          message: 약 꾸러미는 길을 잃지만 않으면 제때 전할 수 있다.

  - id: old_well_awakening_hint
    name: 오래된 우물 아래의 균열
    description: 마을의 오래된 우물 아래에서 차가운 바람과 희미한 문양이 올라온다.
    region_tags: [village, ruin]
    event_tags: [exploration]
    danger_tags: [well, darkness, ancient]
    storylet_tags: [old_well, cracked_seal, ancient_symbol, dungeon, quest_related]
    card_candidate_hints: [descend_old_well, read_cracked_seal, reseal_well_awakening]
    cooldown_tags: [old_well, cracked_seal]
    repeat_group: old_well_probe
    base_weight: 16
    cooldown_turns: 2
    choices:
      - id: pass
        text: 우물 아래의 바람을 확인한다
        type: risky
        risk_level: medium
        result:
          message: 균열은 작지만 더 깊은 곳에서 깨어나는 기척이 있다.

  - id: storm_pass_shelter_hint
    name: 폭풍 산길의 피난처
    description: 능선 위 구름이 빠르게 낮아지고 바람이 바위틈으로 몰린다.
    region_tags: [village, forest]
    event_tags: [survival]
    danger_tags: [storm, hunger]
    storylet_tags: [storm_pass, weather, shelter, survival, quest_related]
    card_candidate_hints: [read_storm_pass_sky, secure_storm_shelter, return_from_storm_pass]
    cooldown_tags: [storm_pass, shelter]
    repeat_group: storm_pass_probe
    base_weight: 16
    cooldown_turns: 2
    choices:
      - id: pass
        text: 바람의 방향을 읽는다
        type: safe
        risk_level: low
        result:
          message: 폭풍은 오래가지 않겠지만 피할 곳을 잡지 못하면 위험하다.

  - id: cursed_well
    name: 저주받은 우물
    description: 검은 물이 고인 우물에서 낮은 속삭임이 들린다.
    region_tags: [forest, ruin]
    event_tags: [exploration, curse]
    danger_tags: [well, darkness, curse]
    base_weight: 10
    max_occurrences_per_run: 2
    choices:
      - id: pass
        text: 그냥 지나간다
        type: safe
        risk_level: none
        result:
          status: {food: -1}
          message: 먼 길을 돌아가며 식량을 조금 소모했다.
      - id: drink
        text: 물을 마신다
        type: gamble
        risk_level: high
        result_pool:
          - when: {curse: {max: 1}}
            result:
              status: {health: +1, curse: +1}
              message: 물은 차갑고 달콤했지만 손끝이 검게 물들었다.
          - when: {default: true}
            result:
              status: {curse: +2}
              message: 우물의 물은 이미 당신 안의 저주에 반응했다.
      - id: purify
        text: 성수로 정화한다
        type: item_based
        risk_level: low
        requires_item: holy_water
        consume_item: true
        result:
          status: {curse: -1, reputation: +1}
          remove_item: [holy_water]
          event_weight: {holy: +1}
          message: 성수가 검은 물결을 잠재웠다.
      - id: climb_down
        text: 밧줄로 내려간다
        type: item_based
        risk_level: medium
        requires_item: rope
        result:
          status: {health: -1, money: +3, curse: +1}
          message: 우물 아래에서 은화를 찾았지만 검은 이끼가 팔에 달라붙었다.
    variation_rules:
      - when: {curse: {min: 3}}
        override_description: 우물 속 속삭임이 이제는 당신의 이름을 부른다.

  - id: broken_bridge
    name: 무너진 다리
    description: 계곡 위 낡은 다리가 반쯤 무너져 있다.
    region_tags: [forest, ruin]
    event_tags: [exploration]
    danger_tags: [cliff, trap]
    base_weight: 9
    choices:
      - id: detour
        text: 멀리 돌아간다
        type: safe
        risk_level: low
        result:
          status: {food: -1}
          message: 안전하게 우회했지만 식량을 소모했다.
      - id: cross
        text: 무너진 다리를 건넌다
        type: risky
        risk_level: high
        result:
          status: {health: -2}
          message: 다리는 버텼지만 당신은 심하게 미끄러졌다.
      - id: use_rope
        text: 밧줄을 묶고 건넌다
        type: item_based
        risk_level: low
        requires_item: rope
        result:
          event_weight: {ruin: +1}
          message: 밧줄 덕분에 안전하게 건넜다.

  - id: ruined_gate
    name: 폐허의 문
    description: 오래된 문은 고대 문자로 덮여 있다.
    region_tags: [ruin]
    event_tags: [exploration, magic]
    danger_tags: [ancient, trap]
    base_weight: 8
    choices:
      - id: leave
        text: 문을 건드리지 않는다
        type: safe
        risk_level: none
        result:
          status: {food: -1}
          message: 당신은 폐허를 돌아갔다.
      - id: force_open
        text: 억지로 연다
        type: risky
        risk_level: high
        result:
          status: {health: -1, money: +2}
          add_run_tag: [opened_ruin_gate]
          message: 문은 열렸지만 먼지 속 함정이 작동했다.
      - id: read_marks
        text: 지도를 대조한다
        type: item_based
        risk_level: low
        requires_item: map
        result:
          event_weight: {ancient: +2}
          add_run_tag: [understood_ruin_marks]
          message: 지도 여백의 기호가 문자의 의미를 알려주었다.

  - id: sudden_storm
    name: 갑작스런 폭우
    description: 숲 위로 검은 구름이 몰려오고 길이 진흙으로 잠긴다.
    region_tags: [forest]
    event_tags: [survival]
    danger_tags: [storm, hunger]
    base_weight: 10
    choices:
      - id: wait
        text: 비를 피하며 기다린다
        type: safe
        risk_level: low
        result:
          status: {food: -1}
          message: 비는 그쳤지만 배가 고파졌다.
      - id: push_forward
        text: 강행한다
        type: risky
        risk_level: medium
        result:
          status: {health: -1}
          event_weight: {village: +1}
