    title: 마을 방책을 세운다
    description: 울타리 틈을 막으며 밤에 다가올 위협의 방향을 확인한다.
    slot_role: quest_progress
    base_weight: 125
    tier_hint: critical
    tags: [village, defense, night, quest_related]
    quest_ids: [defend_the_village_night]
    regions: [village]
    applies_to_storylet_tags: [night_threat, barricade, defense]
    progress_key: night_threat_identified
    weight_modifiers: {storylet_tag_match: 25, storylet_hint_bonus: 35, region_match: 10, slot_role_bonus: 5, already_completed: -999, unavailable: -999, recent_repeat_penalty: -25}
