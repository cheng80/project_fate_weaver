    base_weight: 70
    tier_hint: strong
    tags: [ruin, seal, dungeon]
    quest_ids: [old_well_awakening]
    regions: [ruin]
    applies_to_storylet_tags: [cracked_seal, ancient_symbol, dungeon]
    weight_modifiers: {storylet_tag_match: 20, storylet_hint_bonus: 30, region_match: 10, slot_role_bonus: 5, unavailable: -999, recent_repeat_penalty: -25}
