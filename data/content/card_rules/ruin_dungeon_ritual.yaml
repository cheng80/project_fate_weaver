p0_cards:
  - id: descend_old_well
    title: 오래된 우물 아래로 내려간다
    description: 밧줄을 고정하고 우물 아래의 금 간 봉인을 확인한다.
    slot_role: quest_progress
    base_weight: 125
    tier_hint: critical
    tags: [village, ruin, dungeon, quest_related]
    quest_ids: [old_well_awakening]
    regions: [village, ruin]
    applies_to_storylet_tags: [old_well, cracked_seal, dungeon]
    progress_key: cracked_well_seal_found
    weight_modifiers: {storylet_tag_match: 25, storylet_hint_bonus: 35, region_match: 10, slot_role_bonus: 5, already_completed: -999, unavailable: -999, recent_repeat_penalty: -25}
    result:
      status: {health: -1}
      gain_clues: [cracked_well_seal]
      quest_progress: {cracked_well_seal_found: 1}
      score_changes: {discovery: 10, quest_progress: 8}
      next_event_tags: [ruin, dungeon, seal]
      move_to_region: ruin
      message: 우물 아래 금 간 봉인에서 차가운 바람이 새어 나왔다.
