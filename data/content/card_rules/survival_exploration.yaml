      gain_clues: [storm_shelter]
      quest_progress: {storm_shelter_found: 1}
      score_changes: {discovery: 10, quest_progress: 8}
      next_event_tags: [forest, survival, storm]
      move_to_region: forest
      message: 바람이 꺾이는 능선 아래에 비를 피할 바위틈을 찾았다.
