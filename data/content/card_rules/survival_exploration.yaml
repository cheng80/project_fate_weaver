p0_cards:
  - id: read_storm_pass_sky
    title: 산길 하늘을 읽는다
    description: 구름의 속도와 바람 방향을 보고 피난처 위치를 가늠한다.
    slot_role: quest_progress
    base_weight: 125
    tier_hint: critical
    tags: [forest, survival, weather, quest_related]
    quest_ids: [survive_the_storm_pass]
    regions: [village, forest]
    applies_to_storylet_tags: [storm_pass, weather, shelter]
    progress_key: storm_shelter_found
    weight_modifiers: {storylet_tag_match: 25, storylet_hint_bonus: 35, region_match: 10, slot_role_bonus: 5, already_completed: -999, unavailable: -999, recent_repeat_penalty: -25}
