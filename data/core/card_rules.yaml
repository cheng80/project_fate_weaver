p0_cards:
  - id: ask_apothecary
    title: 약사에게 의뢰를 확인한다
    description: 약사가 숲 가장자리에서 자라는 달빛잎의 특징을 알려준다.
    slot_role: quest_progress
    base_weight: 80
    tier_hint: strong
    regions: [village]
    result:
      status: {reputation: 1}
      quest_progress: {briefing_received: 1}
      score_changes: {quest_progress: 5, reputation: 4}
      next_event_tags: [forest, herb]
      move_to_region: forest
      message: 의뢰 내용을 확인하고 숲으로 향했다.
  - id: search_herbs
    title: 약초를 찾는다
    description: 습한 나무뿌리 근처에서 달빛잎을 찾는다.
    slot_role: quest_progress
    base_weight: 70
    tier_hint: strong
    regions: [forest]
    result:
      add_item: [herb]
      quest_progress: {herbs_collected: 1}
      score_changes: {quest_progress: 10}
      next_event_tags: [herb, forest]
      message: 달빛잎 약초를 찾았다.
  - id: return_to_village
    title: 마을로 돌아간다
    description: 숲길을 빠져나와 약사에게 돌아갈 길을 잡는다.
    slot_role: quest_progress
    base_weight: 85
    tier_hint: strong
    regions: [forest]
    requires_progress: {herbs_collected: {min: 3}}
    result:
      quest_progress: {returned_to_village: 1}
      score_changes: {quest_progress: 8, survival: 5}
      next_event_tags: [village, report]
      move_to_region: village
      message: 약초를 챙겨 마을로 돌아왔다.
  - id: report_to_apothecary
    title: 약사에게 보고한다
    description: 모은 약초와 숲에서 본 징조를 약사에게 전한다.
    slot_role: quest_progress
    base_weight: 90
    tier_hint: critical
    regions: [village]
    requires_progress: {herbs_collected: {min: 3}, returned_to_village: {min: 1}}
    result:
      status: {money: 3, reputation: 1}
      quest_progress: {reported_to_apothecary: 1}
      score_changes: {quest_progress: 20, reputation: 4, ending_bonus: 20}
      next_event_tags: [quest_complete]
      message: 약사는 보수를 건네고 다음 의뢰를 암시했다.
  - id: help_injured_traveler
    title: 부상자를 돕는다
    description: 채집한 약초 일부로 숲길의 부상자를 응급 처치한다.
    slot_role: resource_alternative
    base_weight: 5
    tier_hint: strong
    tags: [aid, npc, optional_objective, reputation, forest, quest_related]
    regions: [forest]
    requires_progress: {herbs_collected: {min: 2}}
    applies_to_storylet_tags: [injured_traveler, aid_opportunity]
    applies_to_quest_objectives: [help_injured_traveler]
    progress_key: helped_injured_traveler
    weight_modifiers:
      quest_objective_match: 30
      storylet_tag_match: 20
      storylet_hint_bonus: 25
      region_match: 10
      slot_role_bonus: 5
      cooldown_tag_penalty: -15
      repeat_group_penalty: -30
      already_completed: -999
      unavailable: -999
      recent_repeat_penalty: -25
      low_food_penalty: -10
    result:
      status: {food: -1, reputation: 1}
      quest_progress: {helped_injured_traveler: 1}
      score_changes: {reputation: 4, survival: 3}
      next_event_tags: [safe_path, traveler_helped]
      message: 부상자는 안전한 숲길을 알려 주고 감사 인사를 남겼다.
  - id: inspect_tracks
