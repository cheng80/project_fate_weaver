multi_select_rules:
  max_selected_cards: 2
  default_extra_cost:
    status: {food: -1}
  combo_rules:
    - id: torch_plus_search
      cards: [use_torch_to_search, search_herbs]
      result:
        quest_progress: {herbs_collected: 1}
        score_changes: {quest_progress: 5, discovery: 4}
        gain_clues: [moonleaf_glow]
        next_event_tags: [herb, safe_path]
        message: 횃불빛 아래 달빛잎을 더 찾아 위험을 낮췄다.
    - id: honest_return_plus_bonus
      cards: [return_pack_honestly, negotiate_bonus_payment]
      result:
        score_changes: {resource_management: 3, reputation: 2}
        next_event_tags: [merchant, reward, quest_complete]
        message: 정직한 반환과 침착한 협상으로 상인의 신뢰를 잃지 않았다.
  conflict_rules:
    - id: return_vs_deep_woods
      cards: [return_to_village, enter_deep_woods]
      message: 귀환과 심층 진입은 같은 턴에 함께 선택할 수 없다.
